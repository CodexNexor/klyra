name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Python syntax check
        run: python3 -m py_compile server.py database.py isolation.py controller.py backend.py deploy/run.py

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
